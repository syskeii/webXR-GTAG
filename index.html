<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Gorilla Tag Prototype | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
      body { margin: 0; background-color: #87CEEB; overflow: hidden; }
      #vr-button {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        padding: 20px 40px; font-size: 24px; font-family: sans-serif;
        background: #228B22; color: white; border: none; border-radius: 12px;
        cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.182.0/",
          "uiblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/uiblocks/src/index.js",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/",
          "@dimforge/rapier3d-simd-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-simd-compat@0.19.2/rapier.mjs"
        }
      }
    </script>
  </head>
  <body>
    <button id="vr-button">ENTER VR CLIMBING</button>

    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import RAPIER from '@dimforge/rapier3d-simd-compat';

      class GorillaTagScript extends xb.Script {
        constructor() {
          super();
          this.grabbing = { left: false, right: false };
          this.lastPos = { left: new THREE.Vector3(), right: new THREE.Vector3() };
          this.platforms = [];
        }

        async init() {
          await RAPIER.init();
          this.world = new RAPIER.World({ x: 0.0, y: -9.81, z: 0.0 });
          const bodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(0, 3, 0).lockRotations().setLinearDamping(2.0);
          this.playerBody = this.world.createRigidBody(bodyDesc);
          this.world.createCollider(RAPIER.ColliderDesc.capsule(0.5, 0.3), this.playerBody);
          this.createPlatform(0, -0.5, 0, 40, 1, 40);
          this.createPlatform(0, 2, -5, 4, 1, 4);
          this.createPlatform(5, 4, -5, 4, 1, 4);
          this.createPlatform(-5, 6, -5, 4, 1, 4);
        }

        createPlatform(x, y, z, w, h, d) {
          const body = this.world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z));
          this.world.createCollider(RAPIER.ColliderDesc.cuboid(w/2, h/2, d/2), body);
          const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
          mesh.position.set(x, y, z);
          this.add(mesh);
          this.platforms.push(mesh);
        }

        update() {
          const dt = Math.max(xb.getDeltaTime(), 0.001);
          this.world.step();
          const p = this.playerBody.translation();
          xb.core.user.position.set(p.x, p.y - 0.8, p.z);
          const ctrls = xb.core.input.controllers;
          ['left', 'right'].forEach((side, i) => {
            if (!ctrls[i]) return;
            const pos = new THREE.Vector3().setFromMatrixPosition(ctrls[i].matrixWorld);
            let isNear = false;
            for (const platform of this.platforms) {
              if (pos.distanceTo(platform.position) < 2.5) { isNear = true; break; }
            }
            this.grabbing[side] = isNear;
            if (this.grabbing[side]) {
              const delta = pos.clone().sub(this.lastPos[side]);
              const impulse = delta.multiplyScalar(-0.8 / dt);
              this.playerBody.applyImpulse(impulse, true);
            }
            this.lastPos[side].copy(pos);
          });
          const lin = this.playerBody.linvel();
          this.playerBody.setLinvel({
            x: THREE.MathUtils.clamp(lin.x, -10, 10),
            y: THREE.MathUtils.clamp(lin.y, -10, 10),
            z: THREE.MathUtils.clamp(lin.z, -10, 10)
          }, true);
        }
      }

      document.getElementById('vr-button').addEventListener('click', async () => {
        const options = new xb.Options();
        options.setAppTitle('AI Gorilla Tag Prototype');
        
        // Ensure the XR session starts as part of this click event
        options.xrButton.requestSession = true; 
        
        xb.add(new GorillaTagScript());
        await xb.init(options);
        
        document.getElementById('vr-button').style.display = 'none';
      });
    </script>
  </body>
</html>
